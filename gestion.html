<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RepasParle - Gestion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700&family=Lexend:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="topbar">
      <a href="index.html" class="top-link">Accueil</a>
      <h1>Vue gestion</h1>
      <button id="refreshTeacherBtn" class="ghost-btn" type="button">Actualiser</button>
    </header>

    <main class="app-shell app-teacher">
      <section id="firebaseWarning" class="panel warning hidden"></section>

      <section class="panel teacher-panel teacher-panel-students">
        <h2>Comptes élèves</h2>
        <form id="addStudentForm" class="row-wrap">
          <input
            id="newStudentName"
            class="input"
            type="text"
            maxlength="50"
            placeholder="Nom élève"
            autocomplete="off"
          />
          <button class="primary-btn" type="submit">Ajouter</button>
        </form>
        <p class="hint">Le prof peut supprimer un compte élève.</p>
        <div id="studentsList" class="cards-list"></div>
      </section>

      <section class="panel teacher-panel teacher-panel-meals">
        <h2>Repas enregistrés</h2>
        <div class="row-wrap">
          <select id="mealFilterStudent" class="input" aria-label="Filtre élève">
            <option value="all">Tous les élèves</option>
          </select>
          <button id="exportZipBtn" class="accent-btn" type="button">Exporter ZIP</button>
        </div>
        <p id="exportStatus" class="hint"></p>
        <div id="teacherMealsList" class="cards-list"></div>
      </section>

      <section class="panel teacher-panel teacher-panel-assign">
        <h2>Attribuer une évaluation</h2>
        <form id="assignEvalForm" class="stack">
          <label for="evaluatorSelect">Élève évaluateur</label>
          <select id="evaluatorSelect" class="input">
            <option value="">Choisir...</option>
          </select>

          <label for="targetMealSelect">Repas à évaluer</label>
          <select id="targetMealSelect" class="input">
            <option value="">Choisir...</option>
          </select>

          <div class="stack">
            <p class="inline-title">Critères</p>
            <div id="criteriaList" class="stack"></div>
            <div class="row-wrap">
              <button id="addCriterionBtn" class="ghost-btn" type="button">Ajouter critère</button>
            </div>
          </div>

          <button class="primary-btn" type="submit">Envoyer évaluation</button>
        </form>
      </section>

      <section class="panel teacher-panel teacher-panel-evals">
        <h2>Réponses des élèves</h2>
        <div id="teacherEvaluationsList" class="cards-list"></div>
      </section>
    </main>

    <div id="imageModal" class="image-modal hidden" role="dialog" aria-modal="true" aria-label="Image">
      <button id="imageModalClose" class="image-modal-close" type="button" data-close-lightbox>
        Fermer
      </button>
      <img id="imageModalImg" class="image-modal-img" alt="" />
      <p id="imageModalCaption" class="image-modal-caption"></p>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script type="module" src="js/teacher.js"></script>
  </body>
</html>
